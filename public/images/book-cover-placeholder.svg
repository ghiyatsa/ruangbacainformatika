<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-labelledby="cp-title cp-desc">
  <title id="cp-title">Book cover placeholder</title>
  <desc id="cp-desc">Placeholder image for books without a cover.</desc>
  <style>
    .bg    { fill: #ededf0; }
    .spine { fill: #d8d8de; }
    .panel { fill: #e4e4ea; }
    .fold  { fill: #c4c4cc; }
    .ln1   { fill: #d0d0d8; }
    .ln2   { fill: #d8d8e0; }
    .ln3   { fill: #dcdce4; }
    @media (prefers-color-scheme: dark) {
      .bg    { fill: #1e1e2a; }
      .spine { fill: #2a2a3a; }
      .panel { fill: #252535; }
      .fold  { fill: #3a3a50; }
      .ln1   { fill: #333348; }
      .ln2   { fill: #2e2e42; }
      .ln3   { fill: #2a2a3c; }
    }
  </style>

  <!-- Background -->
  <rect width="300" height="400" class="bg"/>

  <!-- Left spine accent -->
  <rect x="0" y="0" width="10" height="400" class="spine"/>

  <!-- Center document icon panel -->
  <rect x="98" y="90" width="104" height="136" rx="10" class="panel"/>
  <!-- top-right corner fold -->
  <polygon points="174,90 202,118 174,118" class="fold"/>
  <!-- text lines on document -->
  <rect x="114" y="144" width="72" height="7" rx="3.5" class="ln1"/>
  <rect x="114" y="160" width="58" height="6" rx="3" class="ln2"/>
  <rect x="114" y="174" width="44" height="5" rx="2.5" class="ln3"/>

  <!-- Bottom caption lines -->
  <rect x="44" y="282" width="130" height="7" rx="3.5" class="ln1"/>
  <rect x="44" y="298" width="100" height="6" rx="3" class="ln2"/>
  <rect x="44" y="312" width="76" height="5" rx="2.5" class="ln3"/>
</svg>
