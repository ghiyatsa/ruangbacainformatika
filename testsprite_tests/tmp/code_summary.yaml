version: "2"
type: frontend
tech_stack:
  - TypeScript
  - PHP
  - Laravel
  - React
  - Inertia.js
  - Tailwind CSS
routes:
  - path: /
    file: resources/js/pages/welcome.tsx
    auth_required: false
    description: Homepage of Ruang Baca Informatika
  - path: /books
    file: resources/js/pages/catalog.tsx
    auth_required: false
    description: Book catalog listing page
  - path: /books/{book:slug}
    file: resources/js/pages/books/show.tsx
    auth_required: false
    description: Detail view of a single book
  - path: /skripsi
    file: resources/js/pages/skripsi/index.tsx
    auth_required: false
    description: Undergraduate thesis listing page
  - path: /skripsi/{skripsi:student_id}
    file: resources/js/pages/skripsi/show.tsx
    auth_required: false
    description: Undergraduate thesis details page
  - path: /internship-reports
    file: resources/js/pages/internship-report/index.tsx
    auth_required: false
    description: Internship report listing page
  - path: /internship-reports/{internshipReport:student_id}
    file: resources/js/pages/internship-report/show.tsx
    auth_required: false
    description: Internship report details page
  - path: /thesis
    file: resources/js/pages/thesis/index.tsx
    auth_required: false
    description: Master thesis listing page
  - path: /thesis/{thesis:student_id}
    file: resources/js/pages/thesis/show.tsx
    auth_required: false
    description: Master thesis details page
  - path: /search
    file: resources/js/pages/catalog.tsx
    auth_required: false
    description: Search results page
  - path: /about
    file: resources/js/pages/about.tsx
    auth_required: false
    description: About page
  - path: /about/team
    file: resources/js/pages/about-team.tsx
    auth_required: false
    description: About team page
  - path: /contact
    file: resources/js/pages/contact.tsx
    auth_required: false
    description: Contact page with query form
  - path: /privacy-policy
    file: resources/js/pages/privacy-policy.tsx
    auth_required: false
    description: Privacy policy document page
  - path: /terms-of-service
    file: resources/js/pages/terms-of-service.tsx
    auth_required: false
    description: Terms of service document page
  - path: /similarity
    file: resources/js/pages/similarity.tsx
    auth_required: true
    description: Academic document similarity check page
  - path: /notifications
    file: resources/js/pages/welcome.tsx
    auth_required: true
    description: User notifications listing page
  - path: /loans/request
    file: resources/js/pages/loans/request.tsx
    auth_required: true
    description: Requesting a book loan/borrowing page
  - path: /loans/history
    file: resources/js/pages/loans/history.tsx
    auth_required: true
    description: Book loan history and returns page
  - path: /register/profile
    file: resources/js/pages/auth/register-profile.tsx
    auth_required: true
    description: Complete member profile setup page after OAuth registration
  - path: /register/whatsapp
    file: resources/js/pages/auth/verify-whatsapp.tsx
    auth_required: true
    description: Verify WhatsApp phone number page during onboarding
  - path: /settings/profile
    file: resources/js/pages/settings/profile.tsx
    auth_required: true
    description: Member profile settings page
  - path: /settings/security
    file: resources/js/pages/settings/security.tsx
    auth_required: true
    description: Member security settings page
  - path: /kiosk
    file: resources/js/pages/kiosk/index.tsx
    auth_required: false
    description: Kiosk mode page for scanning and local library operations
features:
  - name: Homepage Features
    description: Browse popular books, new books, and check announcements
    files:
      - resources/js/pages/welcome.tsx
    entry_route: /
    user_interactions:
      - Click on navigation links
      - View popular books slider
      - View new books section
    api_calls: []
    auth_required: false
  - name: Book Catalog & Search
    description: Search and filter the library books catalog
    files:
      - resources/js/pages/catalog.tsx
    entry_route: /books
    user_interactions:
      - Type search query into search input field
      - Select filters
      - Press enter or click search button
      - See search results
    api_calls: []
    auth_required: false
  - name: Book Details
    description: View individual book details and add to borrowing draft
    files:
      - resources/js/pages/books/show.tsx
    entry_route: /books/{book:slug}
    user_interactions:
      - View details of a book
      - Click "Add to Borrow Draft" button if logged in
    api_calls:
      - method: POST
        endpoint: /loans/request/books
    auth_required: false
  - name: Member Registration & Onboarding
    description: Connect account via Google OAuth and complete registration profile
    files:
      - resources/js/pages/auth/register-profile.tsx
      - resources/js/pages/auth/verify-whatsapp.tsx
    entry_route: /register/profile
    user_interactions:
      - Authenticate using Google OAuth
      - Fill profile information (identity number, phone, address)
      - Submit profile form
      - Receive WhatsApp OTP code
      - Fill and submit WhatsApp verification OTP
    api_calls:
      - method: PATCH
        endpoint: /register/profile
      - method: POST
        endpoint: /register/whatsapp/send
      - method: POST
        endpoint: /register/whatsapp/verify
    auth_required: true
  - name: Contact Library
    description: Contact page form for submitting feedback or queries
    files:
      - resources/js/pages/contact.tsx
    entry_route: /contact
    user_interactions:
      - Fill name field
      - Fill email field
      - Fill message text field
      - Click submit contact button
    api_calls:
      - method: POST
        endpoint: /contact
    auth_required: false
  - name: Similarity Checker
    description: Upload and verify similarity of academic documents
    files:
      - resources/js/pages/similarity.tsx
    entry_route: /similarity
    user_interactions:
      - Choose document file for upload
      - Click Run Similarity Check button
      - View similarity percentage and details report
    api_calls:
      - method: POST
        endpoint: /similarity/check
    auth_required: true
  - name: Book Borrow Request Draft
    description: Manage books added to borrow draft and generate QR code for physical borrowing
    files:
      - resources/js/pages/loans/request.tsx
    entry_route: /loans/request
    user_interactions:
      - View current borrow draft list
      - Click remove book button to discard a book
      - Click "Generate QR Code" to show borrowing QR
    api_calls:
      - method: DELETE
        endpoint: /loans/request/books/{book}
      - method: POST
        endpoint: /loans/request/qr
    auth_required: true
  - name: Loan History & Returns
    description: View current active loans, historical loans, and generate return QR
    files:
      - resources/js/pages/loans/history.tsx
    entry_route: /loans/history
    user_interactions:
      - View active borrowed books
      - View completed borrowing history
      - Select book and click return button to generate return QR code
    api_calls:
      - method: POST
        endpoint: /loans/history/qr
    auth_required: true
  - name: Kiosk Operations
    description: Physical kiosk actions including scanning and guest visits
    files:
      - resources/js/pages/kiosk/index.tsx
    entry_route: /kiosk
    user_interactions:
      - Fill kiosk PIN to unlock
      - Click Member Registration or Guest Visit buttons
      - Scan QR codes from mobile app to complete transaction
    api_calls:
      - method: POST
        endpoint: /kiosk/pin
      - method: POST
        endpoint: /kiosk/visits
      - method: POST
        endpoint: /kiosk/loans/borrow
      - method: POST
        endpoint: /kiosk/loans/drafts/consume
      - method: POST
        endpoint: /kiosk/loans/return-drafts/consume
    auth_required: false
known_limitations: []
