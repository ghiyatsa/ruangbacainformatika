[variables]
    COMPOSER_ALLOW_SUPERUSER = '1'
    APP_ENV = 'production'
    APP_DEBUG = 'false'
    LOG_CHANNEL = 'stderr'

[phases.setup]
    nixPkgs = ['php83', 'php83Packages.composer', 'nodejs_20', 'mysql-client']

[phases.install]
    cmds = ['composer install --no-interaction --optimize-autoloader --no-dev']

[phases.build]
    cmds = ['npm install', 'npm run build']

[start]
    cmd = 'php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT'
